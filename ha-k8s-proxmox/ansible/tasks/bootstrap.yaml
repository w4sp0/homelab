---
- name: Wait for first control plane to be ready
  ansible.builtin.command:
    cmd: >
      talosctl --talosconfig {{ talos_configuration_location }}
      --nodes {{ talos_control_ip }}
      get members
  register: member_check
  retries: 30
  delay: 10
  until: member_check.rc == 0

- name: Bootstrap etcd on first control plane
  ansible.builtin.command:
    cmd: >
      talosctl --talosconfig {{ talos_configuration_location }}
      --nodes {{ talos_control_ip }}
      bootstrap
