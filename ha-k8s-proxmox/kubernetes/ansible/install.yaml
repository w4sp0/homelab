- name: Generate Talos configs and bootstrap cluster
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cluster_name: "devel-cluster"
    output_directory: "../rendered/"
    talos_configuration_location: "../rendered/talosconfig"
    talos_control_ip: "10.0.0.142"
    kubernetes_endpoint: "https://10.0.0.199:6443"
    talos_control_ips:
      - "10.0.0.142"
      - "10.0.0.143"
      - "10.0.0.144"
    talos_worker_ips:
      - "10.0.0.147"
      - "10.0.0.148"
      - "10.0.0.149"
      - "10.0.0.150"
      - "10.0.0.151"
      - "10.0.0.152"
  tasks:
    - name: Generate Talos secrets
      ansible.builtin.include_tasks: tasks/gen-secrets.yaml

    - name: Generate Talos machine configs
      ansible.builtin.include_tasks: tasks/gen-config.yaml

    - name: Apply control plane configs
      ansible.builtin.include_tasks: tasks/apply-control-config.yaml

    - name: Apply worker configs
      ansible.builtin.include_tasks: tasks/apply-worker-config.yaml

    - name: Bootstrap cluster
      ansible.builtin.include_tasks: tasks/bootstrap.yaml
